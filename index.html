<!DOCTYPE html>
<html class="light" dir="ltr" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selected Topics 2 Midterm</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-fixed-dim": "#87d3d3", "outline": "#6f7979", "tertiary-fixed": "#bbebeb",
            "surface-bright": "#f7fafa", "surface-container-low": "#f1f4f4", "on-primary": "#ffffff",
            "inverse-on-surface": "#eef1f1", "on-surface-variant": "#3f4948", "on-error": "#ffffff",
            "secondary-container": "#fdd49a", "primary": "#3D8B8B", "tertiary-container": "#4f7c7c",
            "tertiary-fixed-dim": "#a0cfcf", "tertiary": "#366363", "surface-container-highest": "#e0e3e3",
            "primary-fixed": "#a3f0ef", "on-primary-fixed": "#002020", "inverse-primary": "#87d3d3",
            "on-primary-container": "#f3fffe", "background": "#f7fafa", "surface-tint": "#0d6969",
            "error": "#ba1a1a", "on-background": "#181c1d", "primary-container": "#308080",
            "on-tertiary-container": "#f3fffe", "surface-variant": "#e0e3e3", "on-secondary": "#ffffff",
            "secondary": "#77592b", "outline-variant": "#bec9c8", "inverse-surface": "#2d3131",
            "on-secondary-container": "#785a2b", "secondary-fixed-dim": "#e8c088",
            "surface-dim": "#d7dbdb", "on-surface": "#181c1d", "on-error-container": "#93000a",
            "secondary-fixed": "#ffddb0", "surface-container-lowest": "#ffffff", "surface": "#f7fafa",
            "surface-container": "#ebeeee", "on-tertiary": "#ffffff", "error-container": "#ffdad6",
            "surface-container-high": "#e6e9e9"
          },
          fontFamily: {
            headline: ["IBM Plex Sans Arabic", "Manrope", "sans-serif"],
            body: ["IBM Plex Sans Arabic", "Inter", "sans-serif"],
            label: ["IBM Plex Sans Arabic", "Inter", "sans-serif"]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24
    }

    body {
      background-color: #f7fafa;
      background-image: radial-gradient(at 0% 0%, rgba(61, 139, 139, .03) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(197, 160, 107, .03) 0px, transparent 50%);
      transition: background-color .4s, color .4s;
      overflow-x: hidden
    }

    .dark body,
    .dark {
      background-color: #181c1c;
      color: #e0e3e3
    }

    .dark body {
      background-image: radial-gradient(at 0% 0%, rgba(135, 211, 211, .05) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(232, 192, 136, .05) 0px, transparent 50%)
    }

    .editorial-shadow {
      box-shadow: 0 10px 30px rgba(7, 103, 103, .04)
    }

    .dark .editorial-shadow {
      box-shadow: 0 10px 30px rgba(0, 0, 0, .3)
    }

    .dark .dark\:bg-d {
      background: #0b0f0f
    }

    .dark .dark\:bg-card {
      background: #1e2222
    }

    .dark .dark\:border-db {
      border-color: #323636
    }

    .dark .dark\:text-p {
      color: #87d3d3
    }

    .dark .dark\:text-s {
      color: #e8c088
    }

    .dark .dark\:text-sv {
      color: #bfc8c8
    }

    .dark .dark\:bg-sc {
      background: #282b2b
    }

    .dark .dark\:bg-scl {
      background: #1c2020
    }

    .bg-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden
    }

    .bg-shape {
      position: absolute;
      border-radius: 50%;
      opacity: .035
    }

    .dark .bg-shape {
      opacity: .04
    }

    @keyframes drift1 {
      0% { transform: translate(0, 0) scale(1) }
      25% { transform: translate(60px, -40px) scale(1.1) }
      50% { transform: translate(-30px, 70px) scale(.95) }
      75% { transform: translate(40px, 30px) scale(1.05) }
      100% { transform: translate(0, 0) scale(1) }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px) }
      to { opacity: 1; transform: translateY(0) }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px rgba(61, 139, 139, .2) }
      50% { box-shadow: 0 0 20px rgba(61, 139, 139, .4) }
    }

    .animate-fade-up {
      animation: fadeUp .5s ease both
    }

    .stagger-1 { animation-delay: .05s }
    .stagger-2 { animation-delay: .1s }
    .stagger-3 { animation-delay: .15s }
    .stagger-4 { animation-delay: .2s }

    .q-card {
      transition: all .3s cubic-bezier(.4, 0, .2, 1)
    }

    .q-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(7, 103, 103, .08)
    }

    .dark .q-card:hover {
      box-shadow: 0 16px 40px rgba(0, 0, 0, .4)
    }

    .btn-press {
      transition: all .15s ease
    }

    .btn-press:active {
      transform: scale(.96)
    }

    .progress-glow {
      animation: pulse-glow 2s ease-in-out infinite
    }

    /* Textarea Styles */
    .essay-textarea {
      width: 100%;
      min-height: 120px;
      padding: 1rem 1.25rem;
      font-size: 0.95rem;
      line-height: 1.6;
      border: 1px solid rgba(111, 121, 121, 0.2);
      border-radius: 1rem;
      background: rgba(247, 250, 250, 0.8);
      color: #181c1d;
      resize: vertical;
      transition: all 0.3s ease;
      font-family: 'IBM Plex Sans Arabic', 'Inter', sans-serif;
    }

    .dark .essay-textarea {
      background: rgba(40, 43, 43, 0.8);
      border-color: rgba(50, 54, 54, 0.5);
      color: #e0e3e3;
    }

    .essay-textarea:focus {
      outline: none;
      border-color: #3D8B8B;
      box-shadow: 0 0 0 3px rgba(61, 139, 139, 0.1);
    }

    /* AI Check Button Gradient */
    .btn-ai {
      background: linear-gradient(135deg, #3D8B8B 0%, #0284c7 50%, #6366f1 100%);
      background-size: 200% auto;
      transition: all 0.3s ease;
    }

    .btn-ai:hover:not(:disabled) {
      background-position: right center;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.25);
    }

    /* Model Answer Box */
    .model-answer-box {
      display: none;
      margin-top: 1rem;
      padding: 1.25rem;
      background: rgba(61, 139, 139, 0.06);
      border: 1px dashed rgba(61, 139, 139, 0.3);
      border-radius: 1rem;
      animation: fadeUp 0.3s ease both;
    }

    .dark .model-answer-box {
      background: rgba(135, 211, 211, 0.08);
      border-color: rgba(135, 211, 211, 0.2);
    }

    .model-answer-box.show {
      display: block;
    }

    /* AI Response Box */
    .ai-response-box {
      display: none;
      margin-top: 1rem;
      padding: 1.25rem;
      background: rgba(99, 102, 241, 0.08);
      border-left: 4px solid #6366f1;
      border-radius: 0 1rem 1rem 1rem;
      animation: fadeUp 0.3s ease both;
    }

    .dark .ai-response-box {
      background: rgba(99, 102, 241, 0.12);
      border-left-color: #818cf8;
    }

    .ai-response-box.show {
      display: block;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
      color: white;
    }

    .score-excellent { background-color: #2e7d32; }
    .score-good { background-color: #f57c00; }
    .score-poor { background-color: #d32f2f; }

    .ai-loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-left: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .bg-s1 {
      width: 400px;
      height: 400px;
      top: 10%;
      left: -5%;
      background: #3D8B8B;
      animation: drift1 25s ease-in-out infinite
    }

    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: #bec9c8;
      border-radius: 3px
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #3f4948
    }
  </style>
</head>

<body class="font-body text-on-surface antialiased">

  <div class="bg-shapes">
    <div class="bg-shape bg-s1"></div>
    <div class="bg-shape" style="width: 300px; height: 300px; top: 60%; right: -3%; background: #e8c088; animation: drift1 30s ease-in-out infinite reverse; border-radius: 50%;"></div>
    <div class="bg-shape" style="width: 250px; height: 250px; top: 30%; left: 50%; background: #87d3d3; animation: drift1 20s ease-in-out infinite; border-radius: 30%;"></div>
  </div>

  <header id="main-header"
    class="bg-white/80 dark:bg-card backdrop-blur-md sticky top-0 z-50 border-b border-surface-container-highest dark:border-db transition-all duration-300">
    <div
      class="max-w-7xl mx-auto px-4 md:px-6 py-3 md:py-0 md:h-20 flex flex-col md:flex-row justify-between items-center gap-2 md:gap-0 relative">
      <div class="flex items-center justify-between w-full md:w-auto">
        <span class="text-lg md:text-xl font-bold text-primary dark:text-p font-headline tracking-tight">Selected Topics 2 Midterm</span>
        <div class="flex items-center gap-2 md:hidden">
          <button onclick="resetQuiz()"
            class="flex items-center gap-1.5 px-3 py-1.5 bg-red-50 dark:bg-red-900/20 text-error rounded-full text-xs font-bold btn-press">
            <span class="material-symbols-outlined text-sm">restart_alt</span>Reset
          </button>
          <button onclick="toggleTheme()" id="themeToggleMobile"
            class="p-2 text-on-surface-variant dark:text-sv rounded-full btn-press">
            <span class="material-symbols-outlined text-xl">dark_mode</span>
          </button>

      </div>

      <div class="hidden md:flex items-center gap-3">
        <button onclick="resetQuiz()"
          class="flex items-center gap-2 px-4 py-2 bg-red-50 dark:bg-red-900/20 text-error hover:bg-red-100 dark:hover:bg-red-900/30 rounded-full text-xs font-bold btn-press transition-all">
          <span class="material-symbols-outlined text-sm">restart_alt</span>Reset Quiz
        </button>
        <div class="w-px h-6 bg-outline-variant/30 mx-1"></div>
        <button onclick="toggleTheme()" id="themeToggleDesktop"
          class="p-2.5 text-on-surface-variant dark:text-sv hover:bg-surface-container dark:hover:bg-sc rounded-full btn-press transition-all">

  <div class="min-h-screen pb-10">
    <main id="quiz-section" class="w-full max-w-4xl mx-auto px-4 md:px-6 py-6 md:py-10">
      <section class="mb-8 md:mb-10 animate-fade-up">
        <div class="flex flex-col items-center text-center gap-6 mb-12">
          <h1 class="font-headline text-3xl md:text-4xl lg:text-5xl font-black text-on-surface dark:text-white tracking-tighter">Selected Topics 2 Midterm</h1>
          <div class="flex flex-col items-center gap-3 w-full max-w-sm md:max-w-md">
            <div class="flex items-center justify-between w-full px-1">
              <span class="font-label text-xs md:text-sm font-bold text-secondary dark:text-s uppercase tracking-widest text-[#3D8B8B]">Progress</span>
              <span class="font-label text-xs md:text-sm font-bold text-primary dark:text-p">
                <span id="answered-count">0</span> / 8 <span class="hidden sm:inline">Answered</span>

            <div class="w-full h-3 bg-surface-container-highest dark:bg-sc rounded-full overflow-hidden shadow-inner p-[2px] border border-outline-variant/10 dark:border-db">

        <div class="flex flex-wrap items-center gap-3 p-2 bg-surface-container-low dark:bg-scl rounded-2xl w-full md:w-fit">

          <button onclick="hideAllAnswers()" class="flex-1 md:flex-none px-5 py-2.5 bg-white dark:bg-card text-on-surface-variant dark:text-sv border border-outline-variant/10 dark:border-db rounded-xl font-label text-sm font-semibold hover:bg-surface-bright btn-press transition-all">Hide All Answers</button>

      <div id="questions-container" class="space-y-6 md:space-y-8"></div>

    <footer class="w-full py-12 md:py-16 mt-8">
      <div class="max-w-3xl mx-auto px-6 text-center">
        <div class="bg-white/60 dark:bg-card backdrop-blur-xl rounded-[2rem] p-8 md:p-12 editorial-shadow border border-surface-container-high dark:border-db">
          <div class="mb-5"><span class="material-symbols-outlined text-5xl md:text-6xl text-primary dark:text-primary-fixed-dim" style="font-variation-settings:'FILL' 1,'wght' 400">volunteer_activism</span></div>
          <p class="font-headline text-xl md:text-2xl font-bold text-on-surface dark:text-white leading-relaxed mb-3 animate-fade-up">دعواتكم للمساعد الخفي والعاملين على الموقع</p>
          <p class="font-headline text-lg md:text-xl font-semibold text-primary dark:text-primary-fixed-dim animate-fade-up" style="animation-delay:.15s">بالتوفيق والسداد والزوجة الصالحة</p>
          <div class="flex justify-center items-center gap-2 mt-6 opacity-50"><span style="animation:twinkle 3s infinite">✦</span><span style="animation:twinkle 3s infinite 0.4s">✦</span><span style="animation:twinkle 3s infinite 0.8s">✦</span></div>
        </div>
      </div>
    </footer>
  </div>

  <script>
    // Questions data from PDF
    const quizData = [
      {
        n: 1,
        q: "Explain the concept and importance of Computer Vision.",
        ans: `Concept: A field of AI that enables machines to understand and analyze images and videos.

Importance:
• Object detection and recognition
• Facial recognition
• Medical image analysis
• Self-driving cars perception
• Quality inspection in industries
• Security and surveillance systems`,
        keyPoints: ["field of AI", "understand images", "analyze", "object detection", "facial recognition", "medical", "self-driving", "surveillance"]
      },
      {
        n: 2,
        q: "How can python in programming languages be involved in Computer Vision?",
        ans: `• Image Processing: Use libraries like OpenCV to work with images
• Model Development: Build and train AI models using TensorFlow or PyTorch
• Data Handling: Easily manage and prepare image datasets
• Visualization: Show and analyze images and results`,
        keyPoints: ["opencv", "tensorflow", "pytorch", "image processing", "model development", "data handling"]
      },
      {
        n: 3,
        q: "What are the main stages of Computer Vision (CV) systems?",
        ans: `• Data Collection: Gather images and videos
• Data Preprocessing: Clean and prepare the data
• Model Training: Train models to learn from data
• Model Evaluation: Test performance and accuracy
• Deployment: Use the model in real applications`,
        keyPoints: ["data collection", "preprocessing", "training", "evaluation", "deployment"]
      },
      {
        n: 4,
        q: "Name two AI algorithms that can be applied in Computer Vision.",
        ans: `• Convolutional Neural Networks (CNN)
• Support Vector Machines (SVM)
• (Also acceptable: R-CNN, YOLO, ResNet)`,
        keyPoints: ["cnn", "convolutional", "svm", "support vector", "neural networks"]
      },
      {
        n: 5,
        q: "What is the purpose of data analysis in artificial intelligence?",
        ans: `• To extract useful insights from raw data
• To support decision-making
• To identify patterns and trends
• To improve processes and efficiency
• To help solve problems based on data`,
        keyPoints: ["extract insights", "decision making", "patterns", "trends", "solve problems"]
      },
      {
        n: 6,
        q: "How has artificial intelligence impacted healthcare applications?",
        ans: `• Improved diagnosis: Helps detect diseases earlier and more accurately
• Better treatment: Assists doctors in choosing effective treatments
• Automation: Reduces manual work in hospitals
• Personalized medicine: Provides treatment based on patient data
• Faster analysis: Quickly processes large medical datasets
• Patient monitoring: Enables remote and continuous monitoring
• Reduced errors: Helps minimize human mistakes`,
        keyPoints: ["diagnosis", "treatment", "automation", "personalized", "monitoring", "errors"]
      },
      {
        n: 7,
        q: "What is the limitation of Computer Vision (CV)?",
        ans: `• Requires large amounts of data
• Sensitive to lighting and image quality
• Can make errors in complex scenes
• High computational cost
• May inherit bias from training data
• Limited understanding beyond visual patterns`,
        keyPoints: ["large data", "lighting", "quality", "errors", "computational cost", "bias"]
      },
      {
        n: 8,
        q: "How can high accuracy be achieved in Computer Vision (CV)?",
        ans: `• Use high-quality and clean image data
• Train on large and diverse datasets
• Fine-tune models for specific tasks
• Use strong models like CNNs
• Apply good preprocessing techniques
• Tune model parameters properly
• Use data augmentation to improve learning
• Evaluate and improve using feedback and testing`,
        keyPoints: ["high quality data", "diverse datasets", "fine-tune", "cnn", "preprocessing", "augmentation"]
      }
    ];

    let isAIRequestInProgress = false;

    // Build Questions
    function buildQuestions() {
      const container = document.getElementById('questions-container');
      container.innerHTML = '';

      quizData.forEach((q, idx) => {
        const num = String(q.n).padStart(2, '0');
        const delay = Math.min(idx * 50, 600);

        container.innerHTML += `
          <article class="q-card bg-white dark:bg-card rounded-[1.5rem] md:rounded-[2rem] p-5 md:p-8 editorial-shadow border border-surface-container-high dark:border-db animate-fade-up" style="animation-delay:${delay}ms" data-qnum="${q.n}">
            <div class="flex flex-col gap-4 md:gap-6">
              <div class="flex justify-between items-start">
                <span class="font-label text-[10px] md:text-xs font-bold text-secondary dark:text-s uppercase tracking-widest bg-secondary-fixed/30 dark:bg-amber-900/20 px-3 py-1 rounded-full">Question ${num}</span>
              </div>
              <h3 class="font-headline text-base md:text-xl font-bold text-on-surface dark:text-white leading-snug">${q.q}</h3>

              <textarea 
                class="essay-textarea" 
                id="answer${q.n}" 
                placeholder="Type your answer here..."
                oninput="updateProgress()"
              ></textarea>

              <div class="flex flex-wrap gap-3">
                <button onclick="checkWithAI(${q.n})" id="ai-btn-${q.n}" class="btn-ai flex items-center gap-2 px-5 py-2.5 text-white rounded-xl font-label text-sm font-semibold btn-press transition-all">
                  <span class="material-symbols-outlined text-base">smart_toy</span>
                  Check (AI)
                </button>
                <button onclick="toggleModelAnswer(${q.n})" class="flex items-center gap-2 px-5 py-2.5 bg-secondary-container dark:bg-amber-900/30 text-secondary dark:text-s rounded-xl font-label text-sm font-semibold btn-press transition-all">
                  <span class="material-symbols-outlined text-base">menu_book</span>
                  Show Answer
                </button>
              </div>

              <div class="model-answer-box" id="model-answer-${q.n}">
                <div class="flex items-start gap-3">
                  <span class="material-symbols-outlined text-primary dark:text-p text-xl">check_circle</span>
                  <div class="flex-1">
                    <p class="font-bold text-primary dark:text-p mb-2 text-sm uppercase tracking-wider">Model Answer</p>
                    <div class="text-sm md:text-base leading-relaxed text-on-surface-variant dark:text-sv whitespace-pre-line">${q.ans}</div>
                  </div>
                </div>
              </div>

              <div class="ai-response-box" id="ai-response-${q.n}">
                <div id="ai-content-${q.n}"></div>
              </div>
            </div>
          </article>
        `;
      });
    }

    // Toggle Model Answer
    function toggleModelAnswer(n) {
      const box = document.getElementById(`model-answer-${n}`);
      box.classList.toggle('show');
      if (box.classList.contains('show')) {
        box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    // Show/Hide All Answers
    function showAllAnswers() {
      quizData.forEach(q => {
        document.getElementById(`model-answer-${q.n}`).classList.add('show');
      });
    }

    function hideAllAnswers() {
      quizData.forEach(q => {
        document.getElementById(`model-answer-${q.n}`).classList.remove('show');
        document.getElementById(`ai-response-${q.n}`).classList.remove('show');
      });
    }

    // Reset
    function resetQuiz() {
      quizData.forEach(q => {
        document.getElementById(`answer${q.n}`).value = '';
        document.getElementById(`model-answer-${q.n}`).classList.remove('show');
        document.getElementById(`ai-response-${q.n}`).classList.remove('show');
        const btn = document.getElementById(`ai-btn-${q.n}`);
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined text-base">smart_toy</span> Check (AI)';
      });
      updateProgress();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Update Progress
    function updateProgress() {
      let answered = 0;
      quizData.forEach(q => {
        if (document.getElementById(`answer${q.n}`).value.trim().length > 0) answered++;
      });
      document.getElementById('answered-count').textContent = answered;
      document.getElementById('progress-bar').style.width = `${(answered / 8) * 100}%`;
    }

    // AI Prompt - LENIENT VERSION (less strict)
    const aiPromptTemplate = (question, userAnswer, modelAnswer) => `
TASK: Evaluate the student answer kindly and encouragingly.

QUESTION: ${question}
STUDENT ANSWER: ${userAnswer}
MODEL ANSWER: ${modelAnswer}

EVALUATION CRITERIA (Be generous and kind):
- Give points for any correct keywords or concepts mentioned
- Even partial understanding deserves recognition
- Focus on what the student got RIGHT first
- If the student mentions any relevant terms, give good marks
- Only give low scores if completely wrong or empty

REQUIRED FORMAT:
Score: [0-100]% [Excellent/Good/Fair/Needs Improvement]
Feedback: [2-3 encouraging sentences highlighting what they did well, with gentle suggestions if needed]

Be supportive like a kind teacher who wants to encourage students!
    `;

    // Process AI Response
    function processAIResponse(aiText) {
      let response = aiText.trim();

      const scoreMatch = response.match(/(\d+)%/);
      let score = 0;
      let scoreClass = "score-poor";
      let scoreText = "Needs Improvement";

      if (scoreMatch) {
        score = parseInt(scoreMatch[1]);
        if (score >= 80) {
          scoreClass = "score-excellent";
          scoreText = "Excellent";
        } else if (score >= 60) {
          scoreClass = "score-good";
          scoreText = "Good";
        } else if (score >= 40) {
          scoreClass = "score-good";
          scoreText = "Fair";
        }
      }

      let feedback = response.replace(/^Score:.*$/im, '').trim();
      feedback = feedback.replace(/^Feedback:\s*/i, '');

      const redundantPrefixes = [
        /^Excellent[\s.:-]*\s*/i, /^Good[\s.:-]*\s*/i, /^Fair[\s.:-]*\s*/i, /^Needs Improvement[\s.:-]*\s*/i,
        /^Excellent(?=[A-Z])/i, /^Good(?=[A-Z])/i, /^Fair(?=[A-Z])/i, /^Needs Improvement(?=[A-Z])/i
      ];

      redundantPrefixes.forEach(regex => {
        feedback = feedback.replace(regex, '');
      });

      feedback = feedback.trim();

      if (!feedback || feedback.length < 5) {
        feedback = "Good effort! Keep learning and you'll master these concepts.";
      }

      return { score, scoreClass, scoreText, feedback };
    }

    // Call AI
    async function callAI(prompt) {
      try {
        const response = await fetch('https://text.pollinations.ai/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{ role: 'user', content: prompt }],
            model: 'openai',
            seed: Math.floor(Math.random() * 1000)
          })
        });

        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        return await response.text();
      } catch (error) {
        const retryResponse = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
        return await retryResponse.text();
      }
    }

    // Check with AI
    async function checkWithAI(questionNum) {
      const userAnswer = document.getElementById(`answer${questionNum}`).value.trim();
      const btn = document.getElementById(`ai-btn-${questionNum}`);
      const responseBox = document.getElementById(`ai-response-${questionNum}`);
      const contentDiv = document.getElementById(`ai-content-${questionNum}`);
      const qData = quizData.find(q => q.n === questionNum);

      if (!userAnswer) {
        alert("Please type an answer before checking with AI!");
        return;
      }

      if (isAIRequestInProgress) return;

      isAIRequestInProgress = true;
      btn.disabled = true;

      const loadingMessages = ["جاري التحقق...", "لحظات...", "نحلل إجابتك...", "يا مسهل...", "ثواني..."];
      let msgIndex = 0;
      btn.innerHTML = `<span class="ai-loading"></span> ${loadingMessages[0]}`;

      const interval = setInterval(() => {
        msgIndex = (msgIndex + 1) % loadingMessages.length;
        btn.innerHTML = `<span class="ai-loading"></span> ${loadingMessages[msgIndex]}`;
      }, 2000);

      try {
        const prompt = aiPromptTemplate(qData.q, userAnswer, qData.ans);
        const aiText = await callAI(prompt);
        const result = processAIResponse(aiText);

        contentDiv.innerHTML = `
          <div class="score-badge ${result.scoreClass}">${result.score}% ${result.scoreText}</div>
          <div class="text-sm md:text-base leading-relaxed text-on-surface-variant dark:text-sv">
            <strong class="text-primary dark:text-p">Feedback:</strong> ${result.feedback}
          </div>
        `;
        responseBox.classList.add('show');
        responseBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } catch (error) {
        contentDiv.innerHTML = `
          <div class="score-badge score-poor">Error</div>
          <div class="text-sm">حدث خطأ في الشبكة، يرجى المحاولة مرة أخرى.</div>
        `;
        responseBox.classList.add('show');
      } finally {
        clearInterval(interval);
        isAIRequestInProgress = false;
        btn.disabled = false;
        btn.innerHTML = '<span class="material-symbols-outlined text-base">smart_toy</span> Check (AI)';
      }
    }

    // Theme Toggle
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      html.classList.toggle('dark');
      const icon = isDark ? 'dark_mode' : 'light_mode';
      document.querySelectorAll('#themeToggleMobile .material-symbols-outlined, #themeToggleDesktop .material-symbols-outlined').forEach(el => el.textContent = icon);
      localStorage.setItem('mid2-theme', isDark ? 'light' : 'dark');
    }

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('mid2-theme');
      if (saved === 'dark') {
        document.documentElement.classList.add('dark');
        document.querySelectorAll('#themeToggleMobile .material-symbols-outlined, #themeToggleDesktop .material-symbols-outlined').forEach(el => el.textContent = 'light_mode');
      }
      buildQuestions();
    });
  </script>
